name: gitleaks

on:
  push:
  pull_request:
  workflow_dispatch:

# GITHUB_TOKEN を最小権限に（スキャンは read のみで足りる）
permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（全履歴を取得）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Scan git history
        run: gitleaks git --no-banner --redact --exit-code 1

